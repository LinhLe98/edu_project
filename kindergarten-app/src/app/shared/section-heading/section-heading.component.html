
    <div class="mb-10 md:mb-14" [class.text-center]="align === 'center'">
      <span *ngIf="badge" class="inline-block px-4 py-1 rounded-full text-sm font-body font-medium mb-3"
        [class]="badgeClass">{{ badge }}</span>
      <h2 class="font-heading text-3xl md:text-4xl font-bold text-gray-800 mb-3">{{ title }}</h2>
      <div class="w-16 h-1 rounded-full mb-4" [class]="accentClass"
           [class.mx-auto]="align === 'center'"></div>
      <p *ngIf="subtitle" class="font-body text-gray-500 text-lg"
         [class.max-w-xl]="align === 'center'" [class.mx-auto]="align === 'center'">{{ subtitle }}</p>
    </div>
