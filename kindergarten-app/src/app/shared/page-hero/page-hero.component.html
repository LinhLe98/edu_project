
    <section class="relative py-20 md:py-28 overflow-hidden" [class]="bgClass">
      <!-- decorative circles -->
      <div class="absolute top-0 right-0 w-64 h-64 rounded-full opacity-20 -translate-y-1/3 translate-x-1/3" [class]="circleClass"></div>
      <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full opacity-15 translate-y-1/3 -translate-x-1/3" [class]="circleClass"></div>
      <div class="section-container relative z-10 text-center">
        <span *ngIf="badge" class="inline-block px-4 py-1 rounded-full text-sm font-medium mb-4 bg-white/50 text-gray-700">
          {{ badge }}
        </span>
        <h1 class="font-heading text-4xl md:text-5xl font-bold text-gray-800 mb-4">{{ title }}</h1>
        <p *ngIf="subtitle" class="font-body text-gray-600 text-lg max-w-2xl mx-auto">{{ subtitle }}</p>
      </div>
    </section>
