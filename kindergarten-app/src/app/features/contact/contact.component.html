
    <app-page-hero
      title="Liên Hệ"
      subtitle="Chúng tôi luôn sẵn sàng lắng nghe và hỗ trợ quý phụ huynh"
      badge="Liên Hệ"
      bgClass="bg-gradient-to-br from-peach-50 via-warm-50 to-sky-50"
      circleClass="bg-peach-300">
    </app-page-hero>

    <!-- Support request form (moved above map) -->
    <section class="section-padding bg-peach-50">
      <div class="section-container">
        <div class="max-w-2xl mx-auto">
          <div class="text-center mb-8">
            <span class="inline-block bg-peach-100 text-peach-600 text-xs font-semibold px-3 py-1 rounded-full font-body mb-3">Hỗ Trợ</span>
            <h2 class="font-heading font-bold text-gray-800 text-3xl">Gửi Yêu Cầu Hỗ Trợ</h2>
            <p class="font-body text-gray-500 mt-2 text-sm">Điền vào mẫu bên dưới — chúng tôi sẽ phản hồi trong vòng 24 giờ làm việc.</p>
          </div>

          <!-- Success message -->
          <div *ngIf="formSuccess()" class="bg-green-50 border border-green-200 rounded-2xl p-5 mb-6 flex items-start gap-3">
            <span class="text-green-500 text-xl mt-0.5">✓</span>
            <div>
              <p class="font-body font-semibold text-green-800 text-sm">Yêu cầu đã được gửi thành công!</p>
              <p class="font-body text-green-600 text-sm mt-0.5">Cảm ơn quý phụ huynh. Chúng tôi sẽ liên hệ lại sớm nhất có thể.</p>
            </div>
          </div>

          <!-- Error message -->
          <div *ngIf="formError()" class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6">
            <p class="font-body text-red-600 text-sm">Vui lòng điền đầy đủ họ tên và nội dung yêu cầu.</p>
          </div>

          <div *ngIf="!formSuccess()" class="card-base p-6 md:p-8">
            <div class="flex flex-col gap-4">
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block font-body text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-peach-500">*</span></label>
                  <input type="text"
                         [(ngModel)]="formData.name"
                         placeholder="Nguyễn Văn A"
                         required
                         class="w-full px-4 py-2.5 rounded-xl border border-gray-200 font-body text-sm focus:outline-none focus:border-peach-400 bg-white transition-colors">
                </div>
                <div>
                  <label class="block font-body text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                  <input type="tel"
                         [(ngModel)]="formData.phone"
                         placeholder="0912 345 678"
                         class="w-full px-4 py-2.5 rounded-xl border border-gray-200 font-body text-sm focus:outline-none focus:border-peach-400 bg-white transition-colors">
                </div>
              </div>

              <div>
                <label class="block font-body text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email"
                       [(ngModel)]="formData.email"
                       placeholder="email@example.com"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 font-body text-sm focus:outline-none focus:border-peach-400 bg-white transition-colors">
              </div>

              <div>
                <label class="block font-body text-sm font-medium text-gray-700 mb-1">Chủ đề</label>
                <select [(ngModel)]="formData.subject"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 font-body text-sm focus:outline-none focus:border-peach-400 bg-white transition-colors appearance-none">
                  <option value="">-- Chọn chủ đề --</option>
                  <option *ngFor="let opt of subjectOptions" [value]="opt">{{ opt }}</option>
                </select>
              </div>

              <div>
                <label class="block font-body text-sm font-medium text-gray-700 mb-1">Nội dung yêu cầu <span class="text-peach-500">*</span></label>
                <textarea [(ngModel)]="formData.message"
                          placeholder="Mô tả yêu cầu của quý phụ huynh..."
                          rows="4"
                          required
                          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 font-body text-sm focus:outline-none focus:border-peach-400 bg-white transition-colors resize-none"></textarea>
              </div>

              <div class="flex items-center gap-4 pt-2">
                <button (click)="submitForm()" class="btn-primary">
                  Gửi yêu cầu
                </button>
                <span class="font-body text-xs text-gray-400">Trường có dấu <span class="text-peach-500">*</span> là bắt buộc</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact info + Map -->
    <section class="section-padding bg-white">
      <div class="section-container">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
          <app-contact-info-card *ngIf="contactInfo()" [info]="contactInfo()!" />
          <app-google-map-embed *ngIf="contactInfo()" [url]="contactInfo()!.googleMapsEmbedUrl" />
        </div>
      </div>
    </section>
