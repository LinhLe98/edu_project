
<app-page-hero
  [title]="groupLabel()"
  [subtitle]="groupSubtitle()"
  badge="Giáo Viên"
  bgClass="bg-gradient-to-br from-lavender-50 via-warm-50 to-sky-50">
</app-page-hero>

<section class="section-padding bg-white">
  <div class="section-container">

    <div class="mb-8">
      <a routerLink="/about"
         fragment="teacher-groups"
         class="inline-flex items-center gap-2 text-lavender-500 hover:text-lavender-700 font-body text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Quay lại Đội Ngũ Giáo Viên
      </a>
    </div>

    <div *ngIf="members().length > 0; else noMembers"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-card-teacher *ngFor="let m of members()" [member]="m" />
    </div>

    <ng-template #noMembers>
      <div class="text-center py-16 text-gray-400 font-body">
        Chưa có thông tin giáo viên cho tổ này.
      </div>
    </ng-template>

  </div>
</section>
